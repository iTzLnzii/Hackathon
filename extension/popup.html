<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 300px; padding: 16px; font-family: sans-serif; background: #0a0a0c; color: white; }
    .btn { background: #4f46e5; color: white; border: none; padding: 10px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .result { margin-top: 16px; padding: 12px; border-radius: 8px; background: rgba(255,255,255,0.05); display: none; }
    .status { font-weight: bold; margin-bottom: 4px; }
    .score { font-size: 24px; font-weight: 900; }
  </style>
</head>
<body>
  <h3>Detector</h3>
  <p style="font-size: 12px; color: #9ca3af;">Verify this page content</p>
  <button id="analyzeBtn" class="btn">Analyze Screenshot</button>
  
  <div id="resultBox" class="result">
    <div id="verdict" class="status"></div>
    <div id="score" class="score"></div>
    <p id="explanation" style="font-size: 11px; color: #9ca3af;"></p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
